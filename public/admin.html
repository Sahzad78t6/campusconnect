<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - CampusConnect</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const token = localStorage.getItem("token");

if(!token){
  window.location.href = "/login.html";
}

const payload = JSON.parse(atob(token.split('.')[1]));

if(payload.role !== "admin"){
  window.location.href = "/index.html";
}
</script>
<style>
:root {
    --bg: #0f172a;
    --sidebar: #0b1224;
    --card: #1e293b;
    --primary: #6366f1;
    --primary-soft: rgba(99, 102, 241, 0.1);
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: rgba(255, 255, 255, 0.08);
}

* { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }

body {
    display: flex;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}

/* SIDEBAR */
aside {
    width: 280px;
    background: var(--sidebar);
    padding: 40px 24px;
    height: 100vh;
    position: fixed;
    border-right: 1px solid var(--border);
}

aside h2 {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 40px;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 12px;
}

aside button {
    width: 100%;
    margin-bottom: 10px;
    padding: 14px 18px;
    border: none;
    background: transparent;
    color: var(--muted);
    border-radius: 12px;
    cursor: pointer;
    text-align: left;
    transition: 0.3s;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
}

aside button:hover {
    background: var(--primary-soft);
    color: var(--text);
}

/* MAIN CONTENT */
main {
    margin-left: 280px;
    padding: 40px 60px;
    width: calc(100% - 280px);
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
}

.topbar h1 { font-weight: 800; letter-spacing: -1px; }

.logout {
    background: rgba(239, 68, 68, 0.1);
    color: var(--danger);
    padding: 10px 20px;
    border: 1px solid var(--danger);
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
}

.section { display: none; animation: fadeIn 0.4s ease; }
.section.active { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* CARDS ALIGNMENT FIX */
.card {
    background: var(--card);
    padding: 24px 32px;
    border-radius: 16px;
    border: 1px solid var(--border);
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center; /* Vertical Center */
    transition: 0.3s;
}

.card-info {
    text-align: left; /* Keep text to the left */
    flex: 1;
}

.card b { 
    font-size: 18px; 
    margin-bottom: 6px;
    display: block; 
}

.card small { 
    color: var(--muted);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.card-actions {
    display: flex;
    gap: 12px;
    align-items: center;
}

.card button {
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    transition: 0.2s;
}

.delete { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
.delete:hover { background: var(--danger); color: white; }

.mark { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
.mark:hover { background: var(--primary); color: white; }

.availableBtn { background: rgba(16, 185, 129, 0.15); color: var(--success); }
.availableBtn:hover { background: var(--success); color: white; }

/* ANALYTICS */
.dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    background: var(--card);
    padding: 24px;
    border-radius: 20px;
    border: 1px solid var(--border);
}

.revenue-box {
    background: linear-gradient(135deg, var(--primary), #10b981);
    padding: 30px;
    border-radius: 24px;
    color: white;
    font-size: 26px;
    font-weight: 800;
    margin-top: 30px;
    text-align: center;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
    color: white;
}
</style>
</head>

<body>

<aside>
    <h2><i class="fas fa-screwdriver-wrench"></i> Admin Panel</h2>
    <button onclick="showSection('analysis')"><i class="fas fa-chart-line"></i> Analysis</button>
    <button onclick="showSection('events')"><i class="fas fa-calendar-days"></i> Manage Events</button>
    <button onclick="showSection('items')"><i class="fas fa-shop"></i> Marketplace</button>
    <button onclick="showSection('doubts')"><i class="fas fa-circle-question"></i> Doubts Hub</button>
    <button onclick="showSection('career')"><i class="fas fa-graduation-cap"></i> Career Roadmap</button>
    <button onclick="showSection('users')"><i class="fas fa-users-gear"></i> Manage Users</button>
</aside>

<main>
    <div class="topbar">
        <h1>Dashboard Control</h1>
        <button class="logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <div id="analysis" class="section">
        <h2 style="margin-bottom: 25px;">📊 Platform Insights</h2>
        <div class="dashboard-grid">
            <div class="stat-card"><h3>Total Users</h3><h2 id="usersCount">0</h2></div>
            <div class="stat-card"><h3>Total Events</h3><h2 id="eventsCount">0</h2></div>
            <div class="stat-card"><h3>Total Items</h3><h2 id="itemsCount">0</h2></div>
            <div class="stat-card"><h3>Total Doubts</h3><h2 id="doubtsCount">0</h2></div>
        </div>
        <canvas id="statsChart" height="100"></canvas>
        <div id="pieChartContainer" style="max-width:400px; margin: auto;"><canvas id="pieChart"></canvas></div>
        <div class="revenue-box">Total Revenue: ₹ <span id="revenueAmount">0</span></div>
    </div>

    <div id="events" class="section active">
        <h2 style="margin-bottom: 25px;">📅 Active Events</h2>
        <div id="adminEvents"></div>
    </div>

    <div id="items" class="section">
        <h2 style="margin-bottom: 25px;">🛒 Marketplace Inventory</h2>
        <div id="adminItems"></div>
    </div>

    <div id="doubts" class="section">
        <h2 style="margin-bottom: 25px;">❓ Community Questions</h2>
        <div id="adminDoubts"></div>
    </div>

    <div id="career" class="section">
        <h2>🎯 Add Career Phase</h2>
        <div style="background:var(--card); padding:30px; border-radius:20px; border:1px solid var(--border); margin-top:20px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input id="careerTitle" placeholder="Phase Title">
                <input id="careerType" placeholder="Path (web/sde/data)">
                <input id="careerDifficulty" placeholder="Difficulty">
                <input id="careerDuration" placeholder="Duration">
                <input id="careerYoutube" placeholder="YouTube Link">
                <input id="careerW3" placeholder="W3 Link">
                <input id="careerOrder" placeholder="Order">
            </div>
            <button class="mark" style="width: 100%; padding: 15px; margin-top: 10px;" onclick="addCareer()">Deploy Phase</button>
        </div>
    </div>

    <div id="users" class="section">
        <h2 style="margin-bottom: 25px;">👥 User Permissions</h2>
        <div id="adminUsers"></div>
    </div>
</main>

<script>
const API = "/api";

if(!token){ window.location.href = "login.html"; }

function logout(){
    localStorage.removeItem("token");
    window.location.href = "login.html";
}

function showSection(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ================= EVENTS ================= */
async function loadEvents(){
    const res = await fetch(`${API}/events`);
    const data = await res.json();
    document.getElementById("adminEvents").innerHTML = data.map(e=>`
        <div class="card">
            <div class="card-info">
                <b>${e.title}</b>
                <small><i class="far fa-calendar"></i> ${new Date(e.eventDate).toDateString()}</small>
            </div>
            <div class="card-actions">
                <button class="delete" onclick="deleteEvent('${e._id}')">Delete</button>
            </div>
        </div>`).join("");
}

async function deleteEvent(id){
    await fetch(`${API}/events/${id}`,{ method:"DELETE", headers:{ "Authorization": token } });
    loadEvents();
}

/* ================= ITEMS ================= */
async function loadItems(){
    const res = await fetch(`${API}/items`);
    const data = await res.json();
    document.getElementById("adminItems").innerHTML = data.map(i=>{
        let buttons = `<button class="delete" onclick="deleteItem('${i._id}')">Delete</button>`;
        if(i.status !== "sold") buttons += `<button class="mark" onclick="markSold('${i._id}')">Mark Sold</button>`;
        if(i.status !== "available") buttons += `<button class="availableBtn" onclick="markAvailable('${i._id}')">Mark Available</button>`;
        return `
            <div class="card">
                <div class="card-info">
                    <b>${i.title}</b>
                    <small>₹ ${i.price} | Status: <span style="color:var(--primary)">${i.status}</span></small>
                </div>
                <div class="card-actions">${buttons}</div>
            </div>`;
    }).join("");
}

async function markSold(id){
    await fetch(`${API}/items/${id}/sold`,{ method:"PUT", headers:{ "Authorization": token } });
    loadItems();
}

async function markAvailable(id){
    await fetch(`${API}/items/${id}/available`,{ method:"PUT", headers:{ "Authorization": token } });
    loadItems();
}

async function deleteItem(id){
    await fetch(`${API}/items/${id}`,{ method:"DELETE", headers:{ "Authorization": token } });
    loadItems();
}

/* ================= DOUBTS ================= */
async function loadDoubts(){
    const res = await fetch(`${API}/doubts`);
    const data = await res.json();
    document.getElementById("adminDoubts").innerHTML = data.map(d=>`
        <div class="card">
            <div class="card-info">
                <b>${d.question}</b>
                <small>Answers: ${d.answers.length}</small>
            </div>
            <div class="card-actions">
                <button class="delete" onclick="deleteDoubt('${d._id}')">Delete</button>
            </div>
        </div>`).join("");
}

async function deleteDoubt(id){
    await fetch(`${API}/doubts/${id}`,{ method:"DELETE", headers:{ "Authorization": token } });
    loadDoubts();
}

/* ================= USERS ================= */
async function loadUsers(){
    const res = await fetch(`${API}/auth/all`,{ headers:{ "Authorization": token } });
    const users = await res.json();
    document.getElementById("adminUsers").innerHTML = users.map(u=>`
        <div class="card">
            <div class="card-info">
                <b>${u.name}</b>
                <small>${u.email} | Role: <b style="color:var(--primary)">${u.role}</b></small>
            </div>
            <div class="card-actions">
                ${u.role === "user" 
                    ? `<button class="mark" onclick="changeRole('${u._id}','admin')">Promote</button>` 
                    : `<button class="availableBtn" onclick="changeRole('${u._id}','user')">Demote</button>`}
                <button class="delete" onclick="deleteUser('${u._id}')">Delete</button>
            </div>
        </div>`).join("");
}

async function changeRole(id,role){
    await fetch(`${API}/auth/${id}/role`,{
        method:"PUT", headers:{ "Content-Type":"application/json", "Authorization": token },
        body:JSON.stringify({ role })
    });
    loadUsers();
}

async function deleteUser(id){
    await fetch(`${API}/auth/${id}`,{ method:"DELETE", headers:{ "Authorization": token } });
    loadUsers();
}

/* ================= CAREER ================= */
async function addCareer(){
    await fetch(`${API}/career`,{
        method:"POST", headers:{ "Content-Type":"application/json", "Authorization": token },
        body:JSON.stringify({
            title:careerTitle.value, type:careerType.value, difficulty:careerDifficulty.value,
            estimatedTime:careerDuration.value, youtubeLink:careerYoutube.value,
            resourceLink:careerW3.value, order:careerOrder.value
        })
    });
    alert("Phase Added");
}

/* ================= STATS ================= */
async function loadStats(){
    const res = await fetch(`${API}/admin/stats`,{ headers:{ "Authorization": token } });
    const data = await res.json();

    if(window.barChartInstance) window.barChartInstance.destroy();
    if(window.pieChartInstance) window.pieChartInstance.destroy();

    const labels = ["Users", "Events", "Items", "Doubts", "Careers", "Phases"];
    const values = [data.users||0, data.events||0, data.items||0, data.doubts||0, data.careers||0, data.phases||0];

    const barCtx = document.getElementById('statsChart').getContext("2d");
    window.barChartInstance = new Chart(barCtx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: "Platform Stats",
                data: values,
                backgroundColor: ["#4f46e5", "#10b981", "#f59e0b", "#ef4444", "#6366f1", "#14b8a6"],
                borderRadius: 12
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, grid: { color: "rgba(255,255,255,0.05)" }, ticks: { color: "#94a3b8" } },
                x: { grid: { display: false }, ticks: { color: "#94a3b8" } }
            }
        }
    });

    const pieCtx = document.getElementById('pieChart').getContext("2d");
    window.pieChartInstance = new Chart(pieCtx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: ["#4f46e5", "#10b981", "#f59e0b", "#ef4444", "#6366f1", "#14b8a6"],
                borderColor: "#1e293b",
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: true, position: 'bottom', labels: { color: '#f1f5f9', padding: 20 } } }
        }
    });

    document.getElementById("revenueAmount").innerText = data.revenue || 0;
    document.getElementById("doubtsCount").innerText = data.doubts || 0;
    document.getElementById("itemsCount").innerText = data.items || 0;
    document.getElementById("eventsCount").innerText = data.events || 0;
    document.getElementById("usersCount").innerText = data.users || 0;
}

/* INITIAL LOAD */
loadEvents(); loadItems(); loadDoubts(); loadUsers(); loadStats();
</script>
</body>
</html>

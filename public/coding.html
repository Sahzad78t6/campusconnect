<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding Champ</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#0f172a;
  color:white;
}

/* SPLIT LAYOUT */
.coding-layout{
  display:grid;
  grid-template-columns: 1fr 1fr;
  height:100vh;
}

/* LEFT SIDE */
.problem-panel{
  padding:30px;
  overflow-y:auto;
  border-right:1px solid rgba(255,255,255,0.1);
}

.problem-panel h2{
  margin-bottom:10px;
}

.problem-panel pre{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
}

/* RIGHT SIDE */
.editor-panel{
  display:flex;
  flex-direction:column;
  padding:20px;
}

#editor{
  flex:1;
  border-radius:10px;
  overflow:hidden;
}

select, button{
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#6366f1;
  color:white;
  cursor:pointer;
  font-weight:600;
}

button:hover{
  opacity:0.9;
}

#resultStatus{
  margin-top:10px;
  font-weight:700;
}

</style>
</head>

<body>

<div class="coding-layout">

  <!-- LEFT SIDE -->
  <div class="problem-panel">
    <h2 id="title">Loading...</h2>
    <p id="description"></p>

    <h4>Sample Input</h4>
    <pre id="sampleInput"></pre>

    <h4>Sample Output</h4>
    <pre id="sampleOutput"></pre>
  </div>

  <!-- RIGHT SIDE -->
  <div class="editor-panel">

    <select id="languageSelect">
      <option value="71">Python</option>
      <option value="54">C++</option>
      <option value="62">Java</option>
    </select>

    <textarea id="codeArea" style="flex:1;background:#1e293b;color:white;padding:10px;border:none;border-radius:10px;"></textarea>

    <button onclick="submitCode()">Submit Code</button>

    <div id="resultStatus"></div>

  </div>

</div>

<script src="coding.js"></script>

</body>
</html>
